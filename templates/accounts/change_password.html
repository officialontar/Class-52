{% extends "base.html" %}


{% block title %}
Change Password
{% endblock %}


{% block content %}

<div class="max-w-lg mx-auto mt-16 bg-white shadow-lg rounded-xl p-8">

<h2 class="text-2xl font-bold mb-6 text-center">
Change Password
</h2>

<form method="POST">
{% csrf_token %}

{{ form.as_p }}

<button type="submit"
class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-green-500">
Update Password
</button>

</form>

</div>

{% endblock %}

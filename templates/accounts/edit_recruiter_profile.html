{% extends "base.html" %}

{% block title %}
Edit Company Profile
{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto mt-10 bg-white shadow-xl rounded-xl p-8">

<h2 class="text-2xl font-bold mb-6 text-center">
Edit Company Profile
</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="grid grid-cols-2 gap-6">

<div>
<label class="block text-sm font-semibold mb-1">First Name</label>
<input type="text" name="first_name"
value="{{ request.user.first_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">Last Name</label>
<input type="text" name="last_name"
value="{{ request.user.last_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">Email</label>
<input type="email" name="email"
value="{{ request.user.email }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">Phone</label>
<input type="text" name="phone"
value="{{ request.user.phone }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">Company Name</label>
<input type="text" name="company_name"
value="{{ request.user.recruiterprofile.company_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">Company Website</label>
<input type="text" name="company_website"
value="{{ request.user.recruiterprofile.company_website }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">Profile Picture</label>
<input type="file" name="profile_pic"
class="w-full border rounded-lg px-4 py-2">
</div>

</div>

<button type="submit"
class="mt-6 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-green-500">
Update Profile
</button>

</form>

</div>

{% endblock %}

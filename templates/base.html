<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>

{% block title %}
    My Website
{% endblock %}

</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

<!-- NAVBAR -->
{% include 'includes/header.html' %}


{% block content %}


{% endblock %}


<!-- FOOTER -->
{% include 'includes/footer.html' %}



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
    {% for message in messages %}
        <script>
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: '{% if message.tags == "success" %}success{% elif message.tags == "error" %}error{% elif message.tags == "warning" %}warning{% elif message.tags == "info" %}info{% else %}info{% endif %}',
                title: '{{ message|escapejs }}',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                background: '#ffffff',
                color: '#1f2937',
                iconColor: '{% if message.tags == "success" %}#22c55e{% elif message.tags == "error" %}#ef4444{% elif message.tags == "warning" %}#f59e0b{% elif message.tags == "info" %}#3b82f6{% else %}#3b82f6{% endif %}',
                customClass: {
                    popup: 'rounded-xl shadow-xl'
                },
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });
        </script>
    {% endfor %}
{% endif %}


</body>
</html>
